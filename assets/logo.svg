<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250">
    <!-- Spider-Man Mask Base -->
    <path fill="#d90000" d="M100,10 C50,10 20,80 20,130 C20,180 50,230 100,240 C150,230 180,180 180,130 C180,80 150,10 100,10 Z" />
    
    <!-- Web Pattern Lines -->
    <g stroke="black" stroke-width="2" fill="none">
        <line x1="100" y1="10" x2="100" y2="240" />
        <path d="M100,125 C60,110 30,80 20,80" />
        <path d="M100,125 C140,110 170,80 180,80" />
        <path d="M100,125 C50,160 30,170 20,180" />
        <path d="M100,125 C150,160 170,170 180,180" />
        
        <path d="M100,100 C60,90 40,70 30,60" />
        <path d="M100,100 C140,90 160,70 170,60" />
        
        <path d="M100,150 C70,180 50,200 40,210" />
        <path d="M100,150 C130,180 150,200 160,210" />
    </g>

    <!-- Left Eye -->
    <path fill="white" stroke="black" stroke-width="8" stroke-linejoin="round" d="M90,110 C80,80 40,90 35,115 C45,130 80,125 90,110 Z" />
    
    <!-- Right Eye -->
    <path fill="white" stroke="black" stroke-width="8" stroke-linejoin="round" d="M110,110 C120,80 160,90 165,115 C155,130 120,125 110,110 Z" />
</svg>
